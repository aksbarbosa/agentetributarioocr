name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Tests and safety checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system OCR dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-por

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate main config
        run: |
          python tools/validate_config.py config/project_config.json

      - name: Validate OCR config
        run: |
          python tools/validate_ocr_config.py

      - name: Check repository safety
        run: |
          python tools/check_repo_safety.py

      - name: Run unit tests
        run: |
          python tests/run_tests.py

      - name: Run development check
        run: |
          python tools/dev_check.py
